version: "3.9"

services:
  # ── Feature Flag API Server ────────────────────────────────────────────────
  server:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./server:/app
      - flag_data:/app/data
    command: >
      sh -c "pip install -q -r requirements.txt &&
             python seed_data.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flag_data:
